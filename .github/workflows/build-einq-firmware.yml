# Build CrossPoint + Einq Clock; upload firmware.bin artifact.
name: Build Einq firmware

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "apps/inq-face/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pioarduino PlatformIO
        run: |
          uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip
          uv pip install --system 'littlefs-python>=0.16.0' 'fatfs-ng>=0.1.14'

      - name: Clone CrossPoint
        run: |
          git clone --depth 1 --recursive https://github.com/crosspoint-reader/crosspoint-reader.git .vendor/crosspoint-reader

      - name: Apply Einq patch
        run: bash scripts/apply-einq-clock-patch.sh

      - name: Build
        working-directory: .vendor/crosspoint-reader
        run: pio run -e gh_release | tee pio.log

      - uses: actions/upload-artifact@v4
        with:
          name: einq-firmware
          path: .vendor/crosspoint-reader/.pio/build/gh_release/firmware.bin
