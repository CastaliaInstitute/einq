# Publish static site from docs/ plus OTA firmware manifest/binary when available.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "firmware/einq-version"
      - "README.md"
      - "scripts/bundle-pages-site.sh"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bundle site + firmware
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/bundle-pages-site.sh
          bash scripts/bundle-pages-site.sh _pages

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages
      - uses: actions/deploy-pages@v4
        id: deployment
